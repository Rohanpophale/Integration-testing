name: Trial Workflow

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

env:
  ALLOWED_BRANCHES: main, DEV, TEST

concurrency:
  group: trial-workflow-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  branch-filter:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.evaluate.outputs.should_run }}

    steps:
      - name: Evaluate target branch
        id: evaluate
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          normalized_base_ref="$(echo "$BASE_REF" | tr '[:upper:]' '[:lower:]' | xargs)"
          should_run="false"

          IFS=',' read -ra raw_branches <<< "$ALLOWED_BRANCHES"
          for raw_branch in "${raw_branches[@]}"; do
            branch="$(echo "$raw_branch" | xargs)"
            normalized_branch="$(echo "$branch" | tr '[:upper:]' '[:lower:]')"
            if [ "$normalized_base_ref" = "$normalized_branch" ]; then
              should_run="true"
            fi
          done

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"

  trial-run:
    needs: branch-filter
    runs-on: ubuntu-latest

    steps:
      - name: Decide whether to run trial
        run: |
          echo "Should run = ${{ needs.branch-filter.outputs.should_run }}"
          if [ "${{ needs.branch-filter.outputs.should_run }}" != "true" ]; then
            echo "Branch not in allowed list. Marking trial-run as PASS."
            exit 0
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run trial script
        run: python helloworld.py